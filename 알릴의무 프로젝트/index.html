  <nav id="al-nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo">알릴의무 도우미</a>
      <a href="../index.html" class="nav-back">← 가입제안서PJ로 돌아가기</a>

  <main id="al-content">
    <section class="hero">
      <span class="hero-tag">표준알릴의무 작성 보조</span>
      <h1 class="hero-title">알릴의무, 자동으로<br>분류해보세요</h1>
      <p class="hero-sub">병력을 입력하면 표준알릴의무 5문항(Q1~Q5)으로 자동 분류합니다. 이 도구는 작성을 대체하지 않고 보조합니다 — 최종 청약서 기재 전 반드시 직접 확인하세요.</p>
      <div class="hero-badges">
        <span class="hero-badge">Q1 3개월 진찰/검사</span>
        <span class="hero-badge">Q2 상시복용</span>
        <span class="hero-badge">Q3 1년 재검사</span>
        <span class="hero-badge">Q4 5년 입원/수술/치료</span>
        <span class="hero-badge">Q5 11대 질병</span>
      </div>
      <div class="ce-callout warning">
        <p>자동분류 결과는 항상 "초안"입니다. 최종 청약서 기재 전 직접 확인이 필수입니다.</p>
      </div>
    </section>
